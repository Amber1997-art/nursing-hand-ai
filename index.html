<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>外科手消毒监测 - 漏报修复版（日志+敏感阈值）</title>
  <style>
    :root { --blue:#007bff; --ok:#28a745; --warn:#dc3545; --bg:#eef5ff; --panel:#fff; --line:#dce6f5;
      --shadow:0 10px 28px rgba(16,43,82,.12); --radius:14px; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;background:var(--bg);color:#1f2d3d;height:100vh;overflow:hidden}
    .topbar{height:74px;padding:10px 14px;display:grid;grid-template-columns:1.35fr .85fr 1fr;gap:10px;align-items:center;
      color:#fff;background:linear-gradient(90deg,#007bff,#4aa3ff);box-shadow:var(--shadow);z-index:10}
    .title{font-size:17px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .badge{border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.28);text-align:center}
    .badge.ok{background:rgba(40,167,69,.22)} .badge.warn{background:rgba(220,53,69,.22)} .badge.prep{background:rgba(255,193,7,.28)}
    .content{height:calc(100vh - 74px - 56px);display:grid;grid-template-columns:7fr 3fr;gap:12px;padding:12px;min-height:0}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;min-height:0}
    .videoPanel{display:grid;grid-template-rows:1fr auto}
    .videoWrap{position:relative;background:#000;margin:10px;border-radius:12px;overflow:hidden;border:6px solid var(--ok)}
    .videoWrap.violation{border-color:var(--warn);animation:flash .85s infinite alternate}
    @keyframes flash{from{border-color:#ff4254}to{border-color:#ff9ca5}}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
    .overlay{position:absolute;left:12px;top:12px;z-index:3;pointer-events:none;max-width:92%}
    .line{background:rgba(0,0,0,.55);color:#fff;border-radius:12px;padding:8px 10px;font-size:13px;font-weight:900;line-height:1.35;white-space:pre-line}
    .warnLine{display:none;margin-top:8px;background:rgba(220,53,69,.92)}
    .controls{padding:0 10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn,select{border:1px solid #b8d3fb;background:#fff;color:#11407f;border-radius:12px;padding:10px 14px;font-size:14px;font-weight:900;cursor:pointer}
    .btn-primary{background:var(--blue);color:#fff;border-color:#006ae0}
    .btn-danger{background:var(--warn);color:#fff;border-color:#bf2d3b}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .sideHead{padding:12px;background:#f4f9ff;border-bottom:1px solid var(--line);font-weight:900;color:#0f4b93;display:flex;justify-content:space-between;gap:8px}
    .list{list-style:none;padding:10px;overflow:auto;height:100%}
    .empty{color:#6c7a89;font-size:14px;padding:10px;line-height:1.7;border:1px dashed rgba(0,123,255,.25);border-radius:12px;background:#fbfdff}
    .item{border:1px solid #f2b8be;border-radius:12px;margin-bottom:10px;background:#fff5f6;overflow:hidden}
    .head{padding:10px 12px;display:flex;justify-content:space-between;gap:10px;cursor:pointer}
    .type{color:#9a1e2a;font-weight:900;font-size:14px}
    .meta{margin-top:4px;font-size:12px;color:#6c7a89}
    .body{display:none;padding:10px 12px;background:#fff;border-top:1px dashed #efb2b9;font-size:13px;line-height:1.7;color:#5b3337;white-space:pre-wrap}
    .item.open .body{display:block}
    .footer{height:56px;padding:8px 12px;border-top:1px solid var(--line);background:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap;overflow-x:auto}
    .footer .btn{padding:8px 12px;font-size:13px}
    .mask{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(8,24,45,.72);z-index:50}
    .card{width:min(820px,96vw);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px}
    .card h3{margin:0 0 8px;font-size:18px;color:#1557a0}
    .barWrap{background:#eaf2ff;border:1px solid #d2e5ff;border-radius:999px;height:12px;overflow:hidden;margin:8px 0 10px}
    .bar{width:0%;height:100%;background:linear-gradient(90deg,#007bff,#5ab0ff);transition:width .25s}
    .ptext{font-size:14px;font-weight:900;color:#3a4a5f;white-space:pre-line;margin-bottom:8px}
    .log{background:#0d1f34;color:#cde3ff;border-radius:12px;padding:10px;font-size:12px;max-height:30vh;overflow:auto;white-space:pre-wrap;line-height:1.5}
    .actions{margin-top:10px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
    @media (max-width:980px){body{overflow:auto}.topbar{height:auto;grid-template-columns:1fr}.content{height:auto;grid-template-columns:1fr}.videoWrap{height:52vh}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">外科手消毒监测（漏报修复：Pose15/16腕 + 每帧日志 + 2帧确认）</div>
    <div id="timerBadge" class="badge">正式倒计时：05:00</div>
    <div id="stateBadge" class="badge prep">状态：待开始</div>
  </div>

  <div class="content">
    <section class="panel videoPanel">
      <div id="videoWrap" class="videoWrap">
        <video id="video" playsinline muted autoplay></video>
        <div class="overlay">
          <div id="overlayStatus" class="line">加载中…</div>
          <div id="overlayWarn" class="line warnLine"></div>
        </div>
      </div>
      <div class="controls">
        <div class="btns">
          <button id="btnStart" class="btn btn-primary">开始检测</button>
          <button id="btnStop" class="btn btn-danger" disabled>结束检测</button>
          <label class="btn" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input id="chkDebug" type="checkbox" checked /> 每帧Console日志
          </label>
        </div>
        <select id="cameraSelect">
          <option value="environment" selected>后置</option>
          <option value="user">前置</option>
        </select>
      </div>
    </section>

    <aside class="panel">
      <div class="sideHead">
        <span>违规记录</span>
        <span id="vCount" style="font-size:12px;color:#53729b;">0 条</span>
      </div>
      <ul id="violationList" class="list">
        <li class="empty">准备期不记违规。F12 打开控制台可看每帧检测数据。</li>
      </ul>
    </aside>
  </div>

  <div class="footer">
    <span style="font-weight:900;color:#0f4b93;">调试</span>
    <button class="btn" type="button" onclick="testViolation('手低于肘部')">测试：手低于肘部</button>
    <button class="btn" type="button" onclick="testViolation('水倒流（手臂角度）')">测试：水倒流</button>
    <button class="btn" type="button" onclick="testViolation('触碰面部')">测试：触碰面部</button>
    <button class="btn" type="button" onclick="testViolation('可能接触物品（边缘）')">测试：触碰物品</button>
    <button class="btn btn-danger" type="button" onclick="clearViolations()">清空违规</button>
  </div>

  <div id="loadMask" class="mask">
    <div class="card">
      <h3>资源加载</h3>
      <div class="barWrap"><div id="loadBar" class="bar"></div></div>
      <div id="loadText" class="ptext">0%</div>
      <div id="loadLog" class="log"></div>
      <div class="actions">
        <button id="btnRetry" class="btn btn-primary" style="display:none;">重试</button>
        <button id="btnHideLog" class="btn">隐藏</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * MediaPipe Pose（全身）关键点：
     *  0 鼻；11/12 肩；13/14 肘；15/16 腕；23/24 髋
     * 请勿使用 Hands 的 7/8/9/10 当作肘/腕，否则会严重错位导致漏报/误报。
     */

    const THRESHOLDS = {
      handBelowElbow: 0.03,
      handBelowHip: 0.05,
      handAboveShoulder: 0.08,
      touchFace: 0.08,
      edgeTouch: 0.08,
      armAngleDeg: 45,
      waterDirectY: 0.05
    };

    const FRAME_THRESHOLD = 2;
    const COOLDOWN_MS = 5000;
    const PREPARE_SEC = 5;

    const Idx = {
      NOSE: 0,
      L_SH: 11, R_SH: 12,
      L_EL: 13, R_EL: 14,
      L_WR: 15, R_WR: 16,
      L_HIP: 23, R_HIP: 24
    };

    let pose = null;
    let stream = null;
    let rafId = null;
    let busy = false;

    let isDetecting = false;
    let isReady = false;
    let prepareTimer = null;

    let remainSec = 300;
    let examTimer = null;

    let frameCount = 0;

    const violations = [];
    let vid = 0;
    const lastViolationTime = {};

    const vFrames = {
      handBelowElbow: 0,
      handBelowHip: 0,
      handAboveShoulder: 0,
      touchFace: 0,
      armAngle: 0,
      waterDirect: 0,
      touchObjectEdge: 0
    };

    const dom = {
      timerBadge: document.getElementById("timerBadge"),
      stateBadge: document.getElementById("stateBadge"),
      videoWrap: document.getElementById("videoWrap"),
      video: document.getElementById("video"),
      overlayStatus: document.getElementById("overlayStatus"),
      overlayWarn: document.getElementById("overlayWarn"),
      cameraSelect: document.getElementById("cameraSelect"),
      btnStart: document.getElementById("btnStart"),
      btnStop: document.getElementById("btnStop"),
      chkDebug: document.getElementById("chkDebug"),
      violationList: document.getElementById("violationList"),
      vCount: document.getElementById("vCount"),
      loadMask: document.getElementById("loadMask"),
      loadBar: document.getElementById("loadBar"),
      loadText: document.getElementById("loadText"),
      loadLog: document.getElementById("loadLog"),
      btnRetry: document.getElementById("btnRetry"),
      btnHideLog: document.getElementById("btnHideLog")
    };

    const videoElement = dom.video;

    function fmt(sec) {
      sec = Math.max(0, Math.floor(sec));
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return m + ":" + s;
    }

    function elapsedExamStr() {
      return fmt(300 - remainSec);
    }

    function vis(lm) {
      return lm && typeof lm.visibility === "number" ? lm.visibility : 1;
    }

    function distNorm(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function distPx(a, b, w, h) {
      return Math.hypot((a.x - b.x) * w, (a.y - b.y) * h);
    }

    /** 肩-肘-腕夹角（度） */
    function angleDeg(sh, el, wr) {
      const abx = sh.x - el.x, aby = sh.y - el.y;
      const cbx = wr.x - el.x, cby = wr.y - el.y;
      const dot = abx * cbx + aby * cby;
      const m1 = Math.hypot(abx, aby);
      const m2 = Math.hypot(cbx, cby);
      if (m1 * m2 === 0) return 180;
      const c = Math.max(-1, Math.min(1, dot / (m1 * m2)));
      return (Math.acos(c) * 180) / Math.PI;
    }

    function setBadge(kind, text) {
      dom.stateBadge.classList.remove("ok", "warn", "prep");
      if (kind === "ok") dom.stateBadge.classList.add("ok");
      if (kind === "warn") dom.stateBadge.classList.add("warn");
      if (kind === "prep") dom.stateBadge.classList.add("prep");
      dom.stateBadge.textContent = "状态：" + text;
    }

    function setOverlayNormal(msg) {
      dom.videoWrap.classList.remove("violation");
      dom.overlayWarn.style.display = "none";
      dom.overlayWarn.textContent = "";
      dom.overlayStatus.textContent = msg;
    }

    function setOverlayWarn(type, tip) {
      dom.videoWrap.classList.add("violation");
      dom.overlayWarn.style.display = "block";
      dom.overlayWarn.textContent = "违规：" + type + "\n建议：" + tip;
    }

    function addViolation(type, severity, description, suggestion) {
      console.log("🚨 添加违规记录:", type, description);

      const now = Date.now();
      if (lastViolationTime[type] && now - lastViolationTime[type] < COOLDOWN_MS) {
        console.log("⏳ 冷却期内跳过重复类型:", type);
        return false;
      }
      lastViolationTime[type] = now;

      vid += 1;
      violations.push({
        id: vid,
        type,
        severity,
        time: isReady ? elapsedExamStr() : "--:--",
        description,
        suggestion
      });

      updateViolationList();
      setBadge("warn", "违规");
      setOverlayWarn(type, suggestion);
      return true;
    }

    function updateViolationList() {
      console.log("🧾 更新违规列表，当前数量:", violations.length);
      dom.vCount.textContent = violations.length + " 条";

      if (!violations.length) {
        dom.violationList.innerHTML =
          '<li class="empty">暂无违规。可用底部按钮注入测试记录。</li>';
        return;
      }

      dom.violationList.innerHTML = violations
        .slice()
        .reverse()
        .map(
          (v) => `
        <li class="item" data-id="${v.id}">
          <div class="head">
            <div>
              <div class="type">${escapeHtml(v.type)}</div>
              <div class="meta">${escapeHtml(v.time)} · ${escapeHtml(v.severity)}</div>
            </div>
            <div style="font-weight:900;color:#b24a54;">详情</div>
          </div>
          <div class="body">
            <div><b>描述：</b>${escapeHtml(v.description)}</div>
            <div style="margin-top:6px;"><b>建议：</b>${escapeHtml(v.suggestion)}</div>
          </div>
        </li>`
        )
        .join("");

      dom.violationList.querySelectorAll(".item").forEach((li) => {
        li.querySelector(".head").onclick = () => li.classList.toggle("open");
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function bump(key, cond, onFire) {
      if (cond) {
        vFrames[key]++;
        if (vFrames[key] >= FRAME_THRESHOLD) {
          vFrames[key] = 0;
          onFire();
        }
      } else {
        vFrames[key] = 0;
      }
    }

    function resetFrameCounters() {
      Object.keys(vFrames).forEach((k) => (vFrames[k] = 0));
    }

    /**
     * 每帧检测（准备期 isReady=false 时不调用）
     */
    function checkViolations(lm) {
      const wL = lm[Idx.L_WR], wR = lm[Idx.R_WR];
      const eL = lm[Idx.L_EL], eR = lm[Idx.R_EL];
      const sL = lm[Idx.L_SH], sR = lm[Idx.R_SH];
      const hL = lm[Idx.L_HIP], hR = lm[Idx.R_HIP];
      const nose = lm[Idx.NOSE];

      if (!wL || !wR || !eL || !eR || !sL || !sR || !hL || !hR || !nose) {
        if (dom.chkDebug.checked) console.log("[检测帧] 关键点缺失，跳过");
        return;
      }

      const wristY = (wL.y + wR.y) / 2;
      const elbowY = (eL.y + eR.y) / 2;
      const shoulderY = (sL.y + sR.y) / 2;
      const hipY = (hL.y + hR.y) / 2;

      const diffWE = wristY - elbowY;
      const diffWH = wristY - hipY;

      const leftBelow = wL.y > eL.y + THRESHOLDS.handBelowElbow;
      const rightBelow = wR.y > eR.y + THRESHOLDS.handBelowElbow;
      const avgBelow = diffWE > THRESHOLDS.handBelowElbow;

      /** 更敏感：平均超阈值 OR 任一侧超阈值（减少漏报） */
      const condBelowElbow = avgBelow || leftBelow || rightBelow;

      const belowHip = diffWH > THRESHOLDS.handBelowHip;

      const aboveShoulder = wristY < shoulderY - THRESHOLDS.handAboveShoulder;

      const vw = videoElement.videoWidth || 640;
      const vh = videoElement.videoHeight || 480;
      const dLN = distNorm(wL, nose);
      const dRN = distNorm(wR, nose);
      const touchFace = dLN < THRESHOLDS.touchFace || dRN < THRESHOLDS.touchFace;

      const shoulderPx = distPx(sL, sR, vw, vh) || Math.min(vw, vh) * 0.3;
      const touchFacePx =
        distPx(wL, nose, vw, vh) < shoulderPx * (5 / 36) ||
        distPx(wR, nose, vw, vh) < shoulderPx * (5 / 36);

      const leftAngle = angleDeg(sL, eL, wL);
      const rightAngle = angleDeg(sR, eR, wR);

      const rinsingLike =
        (wL.y < hipY || wR.y < hipY) && (wL.y < eL.y || wR.y < eR.y);

      const angleBad = rinsingLike && (leftAngle < THRESHOLDS.armAngleDeg || rightAngle < THRESHOLDS.armAngleDeg);

      const waterDirect =
        rinsingLike &&
        (wL.y > eL.y + THRESHOLDS.waterDirectY || wR.y > eR.y + THRESHOLDS.waterDirectY);

      const edge =
        wL.x < THRESHOLDS.edgeTouch ||
        wL.x > 1 - THRESHOLDS.edgeTouch ||
        wR.x < THRESHOLDS.edgeTouch ||
        wR.x > 1 - THRESHOLDS.edgeTouch;

      if (dom.chkDebug.checked) {
        console.log("=== 检测帧 ===", "frameCount=", frameCount);
        console.log(
          "[Pose] 左腕y/右腕y/左肘y/右肘y",
          wL.y.toFixed(4),
          wR.y.toFixed(4),
          eL.y.toFixed(4),
          eR.y.toFixed(4),
          "| 平均腕y-肘y diffWE=",
          diffWE.toFixed(4),
          "阈值",
          THRESHOLDS.handBelowElbow
        );
        console.log(
          "臀y(左右平均)",
          hipY.toFixed(4),
          "| 手低于肘?",
          condBelowElbow,
          "左/右单帧",
          leftBelow,
          rightBelow
        );
        console.log("左角度/右角度", leftAngle.toFixed(1), rightAngle.toFixed(1), "冲洗启发", rinsingLike, "角度违规", angleBad, "腕低于肘(水倒流启发)", waterDirect);
        console.log("边缘靠近?", edge, "触脸(norm)", touchFace, "触脸(px估)", touchFacePx);
      }

      const avgVis =
        (vis(wL) + vis(wR) + vis(eL) + vis(eR) + vis(sL) + vis(sR) + vis(hL) + vis(hR) + vis(nose)) / 9;

      /** 置信度：过低时整体跳过（减少乱报）；若漏报多可把 0.45 再调低 */
      if (avgVis < 0.45) {
        if (dom.chkDebug.checked) console.log("平均visibility过低，跳过本帧:", avgVis.toFixed(3));
        return;
      }

      /** 手腕置信度：单侧过低时用另一侧做“单侧判据”已在 condBelowElbow 中体现 */
      if (vis(wL) < 0.35 && vis(wR) < 0.35) {
        if (dom.chkDebug.checked) console.log("双侧手腕visibility过低，跳过");
        return;
      }

      bump("handBelowElbow", condBelowElbow, () =>
        addViolation(
          "手低于肘部",
          "高",
          "连续多帧检测：手腕相对肘部位置过低（平均或单侧）。",
          "请保持双手高于肘部。"
        )
      );

      bump("handBelowHip", belowHip, () =>
        addViolation("手低于腰部", "高", "连续多帧检测：手腕相对髋线过低。", "请保持双手在腰（臀线）以上。")
      );

      bump("handAboveShoulder", aboveShoulder, () =>
        addViolation("手高于肩部", "中", "连续多帧检测：双手抬得过高（相对肩线）。", "请将双手保持在肩—腰合理范围。")
      );

      bump("touchFace", touchFace || touchFacePx, () =>
        addViolation("触碰面部", "高", "连续多帧检测：手部过于接近鼻部区域。", "避免操作中触碰口鼻与面部。")
      );

      bump("armAngle", angleBad, () =>
        addViolation(
          "水倒流（手臂角度）",
          "中",
          `冲洗启发式下，肩-肘-腕夹角过小：左 ${leftAngle.toFixed(1)}° / 右 ${rightAngle.toFixed(1)}°（阈值 ${THRESHOLDS.armAngleDeg}°）。`,
          "抬高前臂，避免冲洗时水倒流。"
        )
      );

      bump("waterDirect", !angleBad && waterDirect, () =>
        addViolation(
          "水倒流（腕低于肘）",
          "中",
          "冲洗阶段连续多帧：手腕低于同侧肘部（相对高度差启发）。",
          "保持手高于肘，避免污染区水流向清洁区。"
        )
      );

      bump("touchObjectEdge", edge, () =>
        addViolation(
          "可能接触物品（画面边缘）",
          "中",
          "连续多帧：手部靠近画面左右边缘（教学级启发，可能靠近洗手池/台面）。",
          "尽量保持在画面中央无菌操作区。"
        )
      );

      const pending = Object.values(vFrames).some((n) => n > 0);
      if (!pending) {
        dom.videoWrap.classList.remove("violation");
        dom.overlayWarn.style.display = "none";
        setBadge("ok", "正常");
        setOverlayNormal(`检测中… 正式剩余 ${fmt(remainSec)}`);
      }
    }

    function onPoseResults(results) {
      if (!isDetecting) return;
      if (!isReady) {
        setBadge("prep", "准备中…（不检测）");
        return;
      }
      if (results.poseLandmarks) checkViolations(results.poseLandmarks);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = false;
        s.crossOrigin = "anonymous";
        s.onload = () => resolve(src);
        s.onerror = () => reject(new Error(src));
        document.head.appendChild(s);
      });
    }

    function logLine(x) {
      const t = `[${new Date().toLocaleTimeString()}] ${x}`;
      dom.loadLog.textContent = (dom.loadLog.textContent ? dom.loadLog.textContent + "\n" : "") + t;
      dom.loadLog.scrollTop = dom.loadLog.scrollHeight;
      console.log(t);
    }

    function setLoad(pct, text) {
      pct = Math.max(0, Math.min(100, pct));
      dom.loadBar.style.width = pct + "%";
      dom.loadText.textContent = `${Math.round(pct)}%\n${text || ""}`.trim();
    }

    async function loadFallback(name, urls) {
      const bad = [];
      for (const u of urls) {
        try {
          logLine(`尝试加载 ${name}: ${u}`);
          await loadScript(u);
          logLine(`成功 ${name}: ${u}`);
          return u;
        } catch {
          bad.push(u);
        }
      }
      throw new Error(`${name} 失败：\n- ${bad.join("\n- ")}`);
    }

    async function bootstrapMediaPipe() {
      dom.loadMask.style.display = "flex";
      dom.btnRetry.style.display = "none";
      dom.loadLog.textContent = "";
      setLoad(5, "加载依赖…");

      await loadFallback("camera_utils", [
        "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js",
        "https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"
      ]);
      setLoad(35, "camera_utils OK");

      await loadFallback("drawing_utils", [
        "https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js",
        "https://unpkg.com/@mediapipe/drawing_utils/drawing_utils.js"
      ]);
      setLoad(55, "drawing_utils OK");

      await loadFallback("pose", [
        "https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js",
        "https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js",
        "https://unpkg.com/@mediapipe/pose/pose.js"
      ]);
      setLoad(85, "pose OK");

      const PoseCtor =
        window.Pose && typeof window.Pose.Pose === "function"
          ? window.Pose.Pose
          : typeof window.Pose === "function"
          ? window.Pose
          : null;

      if (!PoseCtor) throw new Error("未找到 Pose 构造函数");

      pose = new PoseCtor({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${file}`
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults(onPoseResults);

      setLoad(100, "完成");
      dom.loadMask.style.display = "none";
      setOverlayNormal("模型就绪：点击「开始检测」。");
      setBadge("prep", "待开始");
    }

    async function setupCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 640 },
          height: { ideal: 480 },
          facingMode: dom.cameraSelect.value === "user" ? "user" : { ideal: "environment" }
        },
        audio: false
      });
      videoElement.srcObject = stream;
      await new Promise((resolve) => {
        videoElement.onloadedmetadata = () => {
          videoElement.play().then(resolve).catch(resolve);
        };
      });
    }

    async function detectFrame() {
      if (!isDetecting) return;

      frameCount++;
      if (dom.chkDebug.checked && frameCount % 1 === 0) {
        console.log("检测帧数:", frameCount, "isReady=", isReady, "busy=", busy);
      }

      try {
        if (!busy && pose) {
          busy = true;
          await pose.send({ image: videoElement });
          busy = false;
        }
      } catch (err) {
        busy = false;
        console.error("MediaPipe 处理错误:", err);
      }

      rafId = requestAnimationFrame(detectFrame);
    }

    function stopLoop() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      busy = false;
    }

    function stopExamTimer() {
      if (examTimer) clearInterval(examTimer);
      examTimer = null;
    }

    function startExamTimer() {
      stopExamTimer();
      remainSec = 300;
      dom.timerBadge.textContent = "正式倒计时：" + fmt(remainSec);
      examTimer = setInterval(() => {
        remainSec--;
        dom.timerBadge.textContent = "正式倒计时：" + fmt(remainSec);
        if (remainSec <= 0) {
          remainSec = 0;
          stopExamTimer();
          stopSession("时间到");
        }
      }, 1000);
    }

    function startPrepare() {
      if (prepareTimer) clearInterval(prepareTimer);
      isReady = false;
      resetFrameCounters();

      let c = PREPARE_SEC;
      setBadge("prep", `准备中… ${c}s（本阶段不检测）`);
      dom.overlayStatus.textContent = `准备中… ${c} 秒后开始正式倒计时与检测`;

      prepareTimer = setInterval(() => {
        c--;
        if (c > 0) {
          setBadge("prep", `准备中… ${c}s（本阶段不检测）`);
          dom.overlayStatus.textContent = `准备中… ${c} 秒后开始正式倒计时与检测`;
        } else {
          clearInterval(prepareTimer);
          prepareTimer = null;
          isReady = true;
          setBadge("ok", "检测中");
          setOverlayNormal("正式检测中…");
          startExamTimer();
        }
      }, 1000);
    }

    function stopSession(reason) {
      isDetecting = false;
      isReady = false;
      stopLoop();
      stopExamTimer();
      if (prepareTimer) clearInterval(prepareTimer);

      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }

      dom.btnStart.disabled = false;
      dom.btnStop.disabled = true;

      setBadge("prep", "已结束");
      dom.overlayStatus.textContent = "已结束：" + (reason || "");
      dom.timerBadge.textContent = "正式倒计时：" + fmt(remainSec);
      resetFrameCounters();
    }

    async function startAll() {
      if (!pose) {
        alert("模型未就绪");
        return;
      }

      dom.btnStart.disabled = true;
      dom.btnStop.disabled = false;

      violations.length = 0;
      vid = 0;
      for (const k in lastViolationTime) delete lastViolationTime[k];
      updateViolationList();

      frameCount = 0;
      isDetecting = true;

      try {
        await setupCamera();
        startPrepare();
        detectFrame();
      } catch (e) {
        console.error(e);
        isDetecting = false;
        stopLoop();
        dom.btnStart.disabled = false;
        dom.btnStop.disabled = true;
        alert("摄像头失败：" + (e && e.message ? e.message : e));
      }
    }

    function testViolation(type) {
      addViolation(type, "高", "手动测试注入", "测试建议");
      console.log("手动测试违规:", type);
    }

    function clearViolations() {
      violations.length = 0;
      vid = 0;
      for (const k in lastViolationTime) delete lastViolationTime[k];
      updateViolationList();
      setOverlayNormal("已清空违规记录");
      setBadge("ok", "待开始");
      console.log("违规记录已清空");
    }

    window.testViolation = testViolation;
    window.clearViolations = clearViolations;

    dom.btnStart.onclick = () => startAll();
    dom.btnStop.onclick = () => stopSession("手动结束");
    dom.btnHideLog.onclick = () => (dom.loadMask.style.display = "none");
    dom.btnRetry.onclick = () =>
      bootstrapMediaPipe().catch((e) => {
        console.error(e);
        dom.btnRetry.style.display = "inline-block";
        logLine(String(e.message || e));
      });

    window.addEventListener("load", () => {
      updateViolationList();
      bootstrapMediaPipe().catch((e) => {
        console.error(e);
        dom.loadMask.style.display = "flex";
        setLoad(100, "失败");
        dom.btnRetry.style.display = "inline-block";
        logLine(String(e.message || e));
      });
    });
  </script>
</body>
</html>
